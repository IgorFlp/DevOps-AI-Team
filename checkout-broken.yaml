# Cenário inicial QUEBRADO do Módulo 4 (Troubleshooting & Self-Healing).
# A imagem aponta para uma tag inexistente, levando o Pod a ImagePullBackOff /
# ErrImagePull ("estado de erro constante"). O Agente SRE deve diagnosticar a
# causa raiz e o checkout-k8s-fix.yaml aplica a correção (imagem válida + probes).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      containers:
      - name: checkout-api
        # ERRO PROPOSITAL: tag de imagem inexistente -> ImagePullBackOff
        image: nginx:versao-que-nao-existe-999
        command: ["/bin/sh",'-c',"exit 1"] # Comando para erro proposital
        ports:
        - containerPort: 80
        # Memoria baixa para cforçar erro de memoria.
        resources:
          limits:
           memory: "4Mi" 
